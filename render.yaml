# Render Blueprint — Fithub Landing v3 static site
# Deploy: Render dashboard → New → Blueprint → repo (aerayy/fithub-landingpage) → Apply
services:
  - type: web
    name: fithub-landing-v3
    runtime: static
    buildCommand: ""        # Static — build adimi yok
    staticPublishPath: .    # Tum dosyalar root'tan servis edilir
    pullRequestPreviewsEnabled: true
    headers:
      # CSS/JS uzun cache (immutable build)
      - path: /style.css
        name: Cache-Control
        value: "public, max-age=300, must-revalidate"
      - path: /script.js
        name: Cache-Control
        value: "public, max-age=300, must-revalidate"
      # Foto/video assets — uzun cache
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=86400"
      # HTML kisa cache (icerik degisirse hizli yansir)
      - path: /*.html
        name: Cache-Control
        value: "public, max-age=60, must-revalidate"
      # Security headers
      - path: /*
        name: X-Content-Type-Options
        value: "nosniff"
      - path: /*
        name: Referrer-Policy
        value: "strict-origin-when-cross-origin"
    routes:
      # SPA-like fallback (ileride sayfalar eklersen kirilmasin)
      - type: rewrite
        source: /*
        destination: /index.html
